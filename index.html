  header{padding:22px 22px 8px;display:flex;align-items:center;gap:12px}
  .brand{display:flex;align-items:center;gap:11px}
  .brand .dot{width:21px;height:21px;border-radius:50%;background:radial-gradient(circle, #E2A63E 0 2.5px, #140c04 3.5px 5px, #38260f 5px 6px, #140c04 6px 11px);box-shadow:0 1px 3px rgba(0,0,0,.6),inset 0 0 0 1px rgba(255,255,255,.08)}
  .brand h1{font-family:var(--disp);font-weight:900;font-size:30px;letter-spacing:-.01em;margin:0;line-height:1;text-shadow:0 2px 0 rgba(0,0,0,.45),0 1px 1px rgba(0,0,0,.6)}
  main{flex:1;padding:6px 18px 108px;overflow-y:auto}
  .page-h{font-family:var(--disp);font-weight:700;font-size:26px;letter-spacing:-.01em;margin:10px 0 16px}
  .muted{color:var(--paper-2)} .faint{color:var(--faint)}
  button{font-family:var(--body);cursor:pointer;border:none;background:none;color:inherit}
  .btn{background:linear-gradient(180deg,#e7ad44,#d2922f);color:#231903;font-weight:700;border-radius:9px;padding:17px 18px;width:100%;font-size:18px;box-shadow:0 4px 0 #9c6a22,0 8px 16px rgba(0,0,0,.35)}
  .btn:active{transform:translateY(2px);box-shadow:0 2px 0 #9c6a22,0 5px 10px rgba(0,0,0,.35)}
  .btn.ghost{background:transparent;color:var(--paper);border:2px solid var(--line)}
  .btn:disabled{opacity:.45}
  .lead{font-size:17px;color:var(--paper-2);margin:2px 0 20px}
  /* crate list */
  .crate-card{background:linear-gradient(180deg,#2a3a3e,#1e2c30);border:1.5px solid #14201f;border-radius:12px;padding:18px;margin-bottom:15px;display:flex;gap:16px;align-items:center;box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.05),inset 0 -14px 26px rgba(0,0,0,.32);position:relative}
  .crate-card:active{transform:scale(.99)}
  .crate-tag{width:52px;height:64px;border-radius:10px;flex-shrink:0;box-shadow:inset 0 -8px 14px rgba(0,0,0,.18)}
  .crate-thumb{width:52px;height:64px;border-radius:8px;flex-shrink:0;background-size:cover;background-position:center;background-color:var(--ink-3);position:relative;box-shadow:inset 0 0 0 1px rgba(0,0,0,.35),0 4px 10px rgba(0,0,0,.4)}
  .crate-thumb.empty{display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:22px}
  .crate-card h3{font-family:var(--disp);font-weight:700;font-size:22px;margin:0 0 4px}
  .crate-meta{font-size:15px;color:var(--paper-2)}
  .open-flag{position:absolute;top:16px;right:18px;font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--keep)}
  /* spine strip */
  .spines{display:flex;gap:4px;padding:14px 2px 10px;overflow-x:auto;margin-bottom:4px}
  .spines::-webkit-scrollbar{display:none}
  .spine{flex:0 0 auto;width:17px;height:86px;border-radius:3px;position:relative;box-shadow:inset -3px 0 6px rgba(0,0,0,.22)}
  .spine:active{transform:translateY(-4px)}
  /* rows */
  .row{display:flex;gap:14px;align-items:center;background:linear-gradient(180deg,#2a3a3e,#1e2c30);border:1.5px solid #14201f;border-radius:10px;padding:13px;margin-bottom:11px;position:relative;touch-action:pan-y;box-shadow:0 6px 14px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.04)}
  .row.dragging{opacity:.95;box-shadow:var(--shadow);background:var(--ink-3);z-index:5}
  .cover{width:60px;height:60px;border-radius:10px;flex-shrink:0;object-fit:cover;background:var(--ink-3);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--faint);text-align:center}
  .row .info{flex:1;min-width:0}
  .row .info b{font-weight:600;font-size:18px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .info .sub{font-size:15px;color:var(--paper-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .row .handle{padding:8px 4px;color:var(--faint);cursor:grab;touch-action:none;font-size:22px;line-height:1}
  .pos{font-family:var(--mono);font-weight:700;font-size:19px;color:var(--amber);background:rgba(240,174,69,.12);border:1.5px solid rgba(240,174,69,.3);border-radius:11px;padding:7px 11px;white-space:nowrap}
  /* detail */
  .det-head{display:flex;align-items:center;gap:14px;margin-bottom:4px}
  .det-head h2{font-family:var(--disp);font-weight:800;font-size:28px;margin:0;letter-spacing:-.01em}
  .backlink{font-size:16px;color:var(--paper-2);display:flex;align-items:center;gap:7px;margin:4px 0 12px;font-weight:600}
  .crate-actions{display:flex;gap:11px;margin:8px 0 18px}
  .crate-actions .btn{flex:1}

<body>
<div id="app">
  <header><div class="brand"><span class="dot"></span><h1>Winyle</h1></div></header>
  <main id="main"></main>
  <nav id="nav"></nav>
</div>
<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script>
/* ===== storage ===== */
/* ===== storage =====
   Online sync via Supabase when configured (CONFIG below), otherwise on-device
   localStorage. Same key/value interface either way. */
const CONFIG={ SUPABASE_URL:'', SUPABASE_KEY:'', CLAUDE_PROXY:'https://winyle-api.winyle-jr.workers.dev/api/claude', WORKER_URL:'https://winyle-api.winyle-jr.workers.dev' };   // SUPABASE_*: online sync · CLAUDE_PROXY: optional smart lookup · WORKER_URL: cloud sync
const ONLINE=()=>!!(CONFIG.SUPABASE_URL&&CONFIG.SUPABASE_KEY);
function supaHeaders(extra){ return Object.assign({apikey:CONFIG.SUPABASE_KEY,Authorization:'Bearer '+CONFIG.SUPABASE_KEY},extra||{}); }
async function sget(k){
  if(ONLINE()){
    try{
      const r=await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/kv?key=eq.${encodeURIComponent(k)}&select=value`,{headers:supaHeaders()});
      const rows=await r.json(); if(rows&&rows[0]) return rows[0].value;
    }catch(e){}
  }
  try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){ return null; }
}
async function sset(k,v){
  try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){}
  if(ONLINE()){
    try{
      await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/kv`,{method:'POST',
        headers:supaHeaders({'Content-Type':'application/json',Prefer:'resolution=merge-duplicates,return=minimal'}),
        body:JSON.stringify({key:k,value:v})});
    }catch(e){}
  }
}
/* ===== cloud sync (GitHub via Worker) ===== */
async function cloudPull(){
  if(!CONFIG.WORKER_URL) return null;
  try{
    const r=await fetch(CONFIG.WORKER_URL+'/api/db');
    if(!r.ok) return null;
    const d=await r.json();
    if(d && d.albums && d.albums.length) return d;
    return null;
  }catch(e){ return null; }
}
async function cloudPush(){
  if(!CONFIG.WORKER_URL) return false;
  try{
    // gather all covers
    const covers={};
    for(const a of state.albums){
      const c=await getCover(a.id);
      if(c) covers[a.id]=c;
    }
    const r=await fetch(CONFIG.WORKER_URL+'/api/db',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({crates:state.crates,albums:state.albums,covers})
    });
    return r.ok;
  }catch(e){ return false; }
}

/* ===== data ===== */
const MOODS=['Spokojny','Energetyczny','Nocny','Skupienie','Impreza','Melancholijny','Surowy'];
const TAGS=['#C04A3E','#EFAD45','#88C47A','#4F9DB0','#9B6FB3','#D77A9E','#5C8A6A','#B0843C'];
let state={crates:[],albums:[],tab:'crates',crateId:null};
const coverCache=new Map();
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
function plPly(n){ if(n===1)return'płyta'; const d=n%10,dd=n%100; if(d>=2&&d<=4&&!(dd>=12&&dd<=14))return'płyty'; return'płyt'; }

async function load(){
  const meta=await sget('winyle-meta');
  if(meta){state.crates=meta.crates||[];state.albums=meta.albums||[];}
  else{
    // try loading from cloud before seeding demo data
    const cloud=await cloudPull();
    if(cloud){
      state.crates=cloud.crates||[];state.albums=cloud.albums||[];
      // restore covers from cloud
      if(cloud.covers){ for(const[id,d]of Object.entries(cloud.covers)){ await saveCover(id,d); } }
      await sset('winyle-meta',{crates:state.crates,albums:state.albums});
    } else { seed();await persist(); }
  }
}
async function persist(){ await sset('winyle-meta',{crates:state.crates,albums:state.albums}); cloudPush(); }
async function saveCover(id,d){ coverCache.set(id,d); await sset('winyle-cover-'+id,d); }
async function getCover(id){ if(coverCache.has(id))return coverCache.get(id); const d=await sget('winyle-cover-'+id); if(d)coverCache.set(id,d); return d; }

function seed(){
  const c1={id:uid(),name:'Niedzielny jazz',tagColor:TAGS[1],closed:true};
  const c2={id:uid(),name:'Sobotni wieczór',tagColor:TAGS[0],closed:false};
  state.crates=[c1,c2];
  const mk=(crateId,pos,artist,title,genre,mood,year,cover)=>({id:uid(),crateId,position:pos,artist,title,genre,mood,year,cover:cover||''});
  state.albums=[
    mk(c1.id,1,'Bill Evans','Sunday at the Village Vanguard','Jazz','Nocny','1961'),
    mk(c1.id,2,'John Coltrane','A Love Supreme','Jazz','Skupienie','1965'),
    mk(c1.id,3,'Nina Simone','Pastel Blues','Soul','Melancholijny','1965'),
    mk(c2.id,1,'Talking Heads','Remain in Light','Rock','Energetyczny','1980'),
    mk(c2.id,2,'Curtis Mayfield','Super Fly','Funk','Impreza','1972'),
  ];
}
function genreColor(g){
  const map={Rock:'#C04A3E',Jazz:'#EFAD45',Soul:'#D77A9E',Funk:'#9B6FB3',Blues:'#4F9DB0','Hip-Hop':'#5C8A6A',Elektronika:'#4F9DB0',Klasyka:'#A9B6AE',Reggae:'#88C47A',Pop:'#D77A9E',Folk:'#B0843C',Punk:'#C04A3E',Metal:'#76918B','Świat':'#5C8A6A'};
  if(map[g])return map[g];
  if(!g)return '#7c5a36';
  let h=0; for(let i=0;i<g.length;i++) h=(h*31+g.charCodeAt(i))>>>0;
  return `hsl(${h%360} 42% 52%)`;
}

/* ===== cover lookup APIs ===== */
function itunesLookup(artist,title){
  return new Promise(res=>{
    const cb='itcb_'+Math.random().toString(36).slice(2);
    const s=document.createElement('script'); let done=false;
    const cleanup=()=>{ try{delete window[cb];}catch(e){} s.remove(); };
    window[cb]=data=>{ done=true; cleanup();
      const r=(data.results||[]).find(x=>x.artworkUrl100)||(data.results||[])[0];
      if(!r){ res(null); return; }
      res({
        cover: r.artworkUrl100? r.artworkUrl100.replace('100x100bb','600x600bb') : null,
        genre: r.primaryGenreName||'',
        year: (r.releaseDate||'').slice(0,4)
      });
    };
    s.onerror=()=>{ if(!done){cleanup();res(null);} };
    const term=encodeURIComponent((artist+' '+title).trim());
    s.src=`https://itunes.apple.com/search?term=${term}&entity=album&limit=5&callback=${cb}`;
    document.body.appendChild(s);
    setTimeout(()=>{ if(!done){cleanup();res(null);} },6000);
  });
}
async function mbCover(artist,title){
  try{
    const q=encodeURIComponent(`artist:"${artist}" AND releasegroup:"${title}"`);
    const r=await fetch(`https://musicbrainz.org/ws/2/release-group/?query=${q}&fmt=json&limit=1`);
    const d=await r.json(); const rg=(d['release-groups']||[])[0]; if(!rg)return null;
    const url=`https://coverartarchive.org/release-group/${rg.id}/front-500`;
    return await new Promise(res=>{ const im=new Image(); im.onload=()=>res(url); im.onerror=()=>res(null); im.src=url; });
  }catch(e){ return null; }
}
async function getApiCover(artist,title){
  if(!artist&&!title) return null;
  const it=await itunesLookup(artist,title);
  if(it&&it.cover) return it;
  const mb=await mbCover(artist,title);
  if(mb) return {cover:mb,genre:'',year:''};
  return null;
}
/* Level 1 — barcode via MusicBrainz */
async function barcodeLookup(code){
  try{
    const r=await fetch(`https://musicbrainz.org/ws/2/release/?query=barcode:${encodeURIComponent(code)}&fmt=json&limit=1`);
    const d=await r.json(); const rel=(d.releases||[])[0]; if(!rel) return null;
    const artist=(rel['artist-credit']||[]).map(a=>a.name||(a.artist&&a.artist.name)||'').join('').trim();
    const title=rel.title||'';
    const year=(rel.date||'').slice(0,4);
    const cover=`https://coverartarchive.org/release/${rel.id}/front-500`;
    const ok=await new Promise(res=>{const im=new Image();im.onload=()=>res(true);im.onerror=()=>res(false);im.src=cover;});
    return {artist,title,year,genre:'',cover:ok?cover:null};
  }catch(e){ return null; }
}
/* Level 2 — Claude figures out the album */
async function claudeFind(query){
  // Requires CONFIG.CLAUDE_PROXY: a small server endpoint that holds your Anthropic
  // API key and forwards to the Messages API. See README. Without it, tier 2 falls
  // back to the iTunes/MusicBrainz album search (no key needed).
  const res=await fetch(CONFIG.CLAUDE_PROXY,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ query })
  });
  const data=await res.json();
  // accept either {artist,title,year,genre} or a raw Anthropic messages response
  if(data && (data.title!==undefined || data.artist!==undefined)) return data;
  const text=((data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('')||'').trim();
  const clean=text.replace(/```json|```/g,'');
  const m=clean.match(/\{[\s\S]*\}/);
  return JSON.parse(m?m[0]:clean);
}
/* camera barcode scanner with manual fallback */
function openBarcodeScanner(cb,onCancel){
  const hasDet=('BarcodeDetector' in window);
  let stream=null,raf=null,running=true;
  const ov=el(`<div class="scanov">
    <video id="scanvid" autoplay muted playsinline></video>
    <div class="scanframe"></div>
    <div class="scanmsg" id="scanmsg">Nakieruj aparat na kod kreskowy</div>
    <div class="scanbtns">
      <button class="btn ghost" id="scanManual">Wpisz kod ręcznie</button>
      <button class="btn ghost" id="scanClose">Anuluj</button>
    </div></div>`);
  document.body.appendChild(ov);
  const cleanup=()=>{running=false;if(raf)cancelAnimationFrame(raf);if(stream)stream.getTracks().forEach(t=>t.stop());ov.remove();};
  ov.querySelector('#scanClose').onclick=()=>{cleanup();if(onCancel)onCancel();};
  ov.querySelector('#scanManual').onclick=()=>{
    ov.querySelector('.scanbtns').style.display='none';
    const box=el(`<div class="scanin"><input id="bcin" inputmode="numeric" placeholder="Numer kodu (EAN/UPC)"><button class="btn" id="bcok" style="width:auto;padding:14px 18px">OK</button></div>`);
    ov.appendChild(box); const inp=box.querySelector('#bcin'); setTimeout(()=>inp.focus(),60);
    box.querySelector('#bcok').onclick=()=>{ const v=inp.value.trim(); if(v){cleanup();cb(v);} };
  };
  if(!hasDet){ ov.querySelector('#scanmsg').textContent='Skaner kamery niedostępny tutaj — wpisz kod ręcznie'; return; }
  (async()=>{
    try{
      stream=await navigator.mediaDevices.getUserMedia({video:{
        facingMode:'environment',width:{ideal:1920},height:{ideal:1080},
        focusMode:{ideal:'continuous'},exposureMode:{ideal:'continuous'},whiteBalanceMode:{ideal:'continuous'}
      }});
      const v=ov.querySelector('#scanvid'); v.srcObject=stream; await v.play();
      const track=stream.getVideoTracks()[0];
      if(track&&track.applyConstraints){try{await track.applyConstraints({advanced:[{focusMode:'continuous'}]});}catch(e){}}
      const det=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e']});
      const scanCv=document.createElement('canvas');const scanCtx=scanCv.getContext('2d');
      const tick=async()=>{ if(!running)return;
        try{
          if(v.videoWidth){
            scanCv.width=v.videoWidth;scanCv.height=v.videoHeight;
            scanCtx.filter='contrast(1.5) brightness(1.1)';
            scanCtx.drawImage(v,0,0);scanCtx.filter='none';
            const codes=await det.detect(scanCv);
            if(codes&&codes.length){ const code=codes[0].rawValue; cleanup(); cb(code); return; }
          }
        }catch(e){}
        raf=requestAnimationFrame(tick); };
      tick();
    }catch(e){ ov.querySelector('#scanmsg').textContent='Brak dostępu do kamery — wpisz kod ręcznie'; }
  })();
}

/* ===== helpers ===== */
function crateAlbums(id){ return state.albums.filter(a=>a.crateId===id).sort((x,y)=>x.position-y.position); }
function neighborInfo(a){
  const albs=crateAlbums(a.crateId);
  const idx=albs.findIndex(x=>x.id===a.id);
  const crate=state.crates.find(c=>c.id===a.crateId);
  const prev=idx>0?albs[idx-1]:null;
  const next=idx<albs.length-1?albs[idx+1]:null;
  const total=albs.length;
  let txt=esc(crate?crate.name:'')+'  ·  miejsce #'+a.position+' z '+total;
  if(prev||next){
    txt+='<div class="nbrs">';
    if(prev) txt+='<span class="nbr">\u2190 '+esc(prev.artist||'')+' \u2014 '+esc(prev.title||'')+'</span>';
    if(prev&&next) txt+=' ';
    if(next) txt+='<span class="nbr">'+esc(next.artist||'')+' \u2014 '+esc(next.title||'')+' \u2192</span>';
    txt+='</div>';
  }
  return txt;
}
function usedGenres(){ return [...new Set(state.albums.map(a=>(a.genre||'').trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'pl')); }
function usedMoods(){ return [...new Set(state.albums.map(a=>(a.mood||'').trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'pl')); }
function frontAlbum(id){ const a=crateAlbums(id); return a[a.length-1]; }
function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstChild; }
function toast(msg){ const r=document.getElementById('toastRoot'); r.innerHTML=''; const t=el('<div class="toast">'+msg+'</div>'); r.appendChild(t); setTimeout(()=>t.remove(),2000); }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
async function resolveCover(a){ if(!a||!a.cover)return null; if(a.cover==='local')return await getCover(a.id); return a.cover; }
function hydrateCovers(scope){
  scope.querySelectorAll('[data-cover],[data-cover-bg]').forEach(async node=>{
    const id=node.getAttribute('data-cover')||node.getAttribute('data-cover-bg');
    const a=state.albums.find(x=>x.id===id); if(!a)return;
    const src=await resolveCover(a); if(!src)return;
    if(node.tagName==='IMG'){node.src=src;node.textContent='';}
    else{node.style.backgroundImage='url("'+src+'")';node.textContent='';}
  });
}

function renderNav(){

    `<button class="${state.tab===id&&!(id==='crates'&&state.crateId)?'on':''}" data-tab="${id}"><span class="ni">${ic}</span>${lbl}</button>`).join('');

function crateThumbHTML(c,w,h){

  m.querySelectorAll('[data-jump]').forEach(s=>s.onclick=()=>{

function rowHTML(a){
  return `<div class="row" data-row="${a.id}">
    <span class="handle" data-handle>⋮⋮</span>
    ${a.cover?`<img class="cover" data-cover="${a.id}" alt="">`:`<div class="cover">brak okładki</div>`}
    <div class="info"><b>${esc(a.title)||'Bez tytułu'}</b>
      <div class="sub">${esc(a.artist)||'Nieznany'} ${a.year?'· '+a.year:''} ${a.genre?'· '+a.genre:''} ${a.rating?'<span class="stars">'+('\u2605'.repeat(a.rating)+'\u2606'.repeat(5-a.rating))+'</span>':''}</div></div>
    <span class="pos">#${a.position}</span>
  </div>`;
}
function enableDrag(crateId){
  const list=document.getElementById('rowList'); if(!list)return;
  let dragRow=null;
  list.querySelectorAll('[data-handle]').forEach(h=>{
    h.addEventListener('pointerdown',e=>{ e.preventDefault(); dragRow=h.closest('.row'); dragRow.classList.add('dragging'); dragRow.setPointerCapture?.(e.pointerId); });
  });
  list.addEventListener('pointermove',e=>{
    if(!dragRow)return; const y=e.clientY;
    const after=[...list.querySelectorAll('.row:not(.dragging)')].find(r=>{const b=r.getBoundingClientRect();return y<b.top+b.height/2;});
    if(after)list.insertBefore(dragRow,after);else list.appendChild(dragRow);
  });
  const drop=()=>{
    if(!dragRow)return; dragRow.classList.remove('dragging');
    const ids=[...list.querySelectorAll('.row')].map(r=>r.dataset.row);
    const backToFront=ids;
    backToFront.forEach((id,i)=>{const a=state.albums.find(x=>x.id===id);if(a)a.position=i+1;});
    dragRow=null; persist(); renderCrateDetail(); toast('Zmieniono kolejność');
  };
  list.addEventListener('pointerup',drop); list.addEventListener('pointercancel',drop);
}

/* ===== modals ===== */
function modal(inner){
  const root=document.getElementById('modalRoot');
  const scrim=el(`<div class="scrim"><div class="sheet"><div class="grab"></div>${inner}</div></div>`);
  scrim.addEventListener('click',e=>{if(e.target===scrim)root.innerHTML='';});
  root.innerHTML=''; root.appendChild(scrim);
  return scrim.querySelector('.sheet');
}
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }

/* capture */
function openCapture(crate){
  const sheet=modal(`<div class="grab"></div>

    <div id="qpill" class="qpill" style="display:none"></div>`);

  const content=()=>sheet.querySelector('#capContent');

  /* ---- Step 1: choose method ---- */
  function showMethods(){
    content().innerHTML=`
      <div style="display:flex;flex-direction:column;gap:12px;padding:10px 0">

  /* ---- Barcode scan ---- */
  function doBarcode(){
    content().innerHTML=`<div class="spin"><div class="ring"></div>Otwieranie skanera…</div>`;
    openBarcodeScanner(async code=>{
      content().innerHTML=`<div class="spin"><div class="ring"></div>Sprawdzam kod ${esc(code)}…</div>`;
      const d=await barcodeLookup(code);
      if(d&&(d.title||d.artist)){
        showResult(d,true);
      } else {
        content().innerHTML=`<div style="text-align:center;padding:20px 0">
          <div style="font-size:42px;margin-bottom:12px">✗</div>
          <div style="font-size:16px;margin-bottom:8px">Kodu <b>${esc(code)}</b> nie ma w bazie</div>
          <div style="font-size:14px;color:var(--faint);margin-bottom:20px">Spróbuj zdjęcia okładki lub wpisz ręcznie</div>
          <div style="display:flex;gap:10px">
            <button class="btn ghost" id="retryPhoto" style="flex:1">📸 Zdjęcie okładki</button>
            <button class="btn ghost" id="retryManual" style="flex:1">✏️ Ręcznie</button>
          </div>
          <button class="btn ghost" id="retryScan" style="margin-top:10px;width:100%">📷 Skanuj kolejny kod</button>
          <div style="margin-top:10px;text-align:center"><a href="#" id="retryBack" style="color:var(--amber);font-size:14px">← Wróć</a></div>
        </div>`;
        content().querySelector('#retryPhoto').onclick=()=>doPhoto();
        content().querySelector('#retryManual').onclick=()=>showManual();
        content().querySelector('#retryScan').onclick=()=>doBarcode();
        content().querySelector('#retryBack').onclick=e=>{e.preventDefault();showMethods();};
      }
    },()=>{
      /* onCancel — go back to method selection */
      showMethods();
    });
  }

  /* ---- Photo → Claude vision ---- */
  function doPhoto(){
    const inp=document.createElement('input');
    inp.type='file';inp.accept='image/*';inp.capture='environment';
    inp.onchange=async()=>{
      const f=inp.files[0]; if(!f)return;
      content().innerHTML=`<div class="spin"><div class="ring"></div>Przetwarzanie zdjęcia…</div>`;
      const dataUrl=await downscale(f);
      if(!dataUrl){content().innerHTML=`<div>Błąd zdjęcia</div>`;return;}
      content().innerHTML=`<div class="spin"><div class="ring"></div>Claude analizuje okładkę…</div>`;
      try{
        const res=await fetch(CONFIG.CLAUDE_PROXY.replace('/api/claude','')+'/api/claude',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({image:dataUrl,query:'Identify this vinyl record album from the cover photo.'})
        });
        const d=await res.json();
        if(d&&(d.title||d.artist)){
          // fetch proper cover from database instead of using user's photo
          const apiCover=await getApiCover(d.artist||'',d.title||'');
          if(apiCover&&apiCover.cover) d.cover=apiCover.cover;
          else d.cover=dataUrl; // fallback to user photo if no db cover
          if(apiCover&&apiCover.year&&!d.year) d.year=apiCover.year;
          showResult(d);
        } else {
          content().innerHTML=`<div style="text-align:center;padding:20px 0">
            <div style="font-size:42px;margin-bottom:12px">🤔</div>
            <div style="font-size:16px;margin-bottom:20px">Nie udało się rozpoznać okładki</div>
            <div style="display:flex;gap:10px">
              <button class="btn ghost" id="retryPhoto2" style="flex:1">📸 Spróbuj ponownie</button>

            </div>
            <div style="margin-top:12px"><a href="#" id="retryBack2" style="color:var(--amber);font-size:14px">← Wróć</a></div>
          </div>`;
          content().querySelector('#retryPhoto2').onclick=()=>doPhoto();
          content().querySelector('#retryManual2').onclick=()=>showManual();
          content().querySelector('#retryBack2').onclick=e=>{e.preventDefault();showMethods();};
        }
      }catch(e){
        content().innerHTML=`<div style="text-align:center;padding:20px 0">
          <div style="font-size:16px;color:var(--oxblood)">Błąd połączenia</div>
          <div style="margin-top:12px"><a href="#" id="errBack" style="color:var(--amber)">← Wróć</a></div>
        </div>`;
        content().querySelector('#errBack').onclick=ev=>{ev.preventDefault();showMethods();};
      }
    };

  /* ---- Result card (after successful barcode or photo) ---- */

      </div>
      <div class="fld"><label>Ocena</label><div id="rPick" class="starrow">${[1,2,3,4,5].map(n=>'<span class="star" data-r="'+n+'">★</span>').join('')}</div></div>

    // add helper

        if(d&&d.cover){applyData(d);setStatus('✓ Znaleziono album','ok');}
        else{showPh('Nie znaleziono');setStatus('✗ Nie znaleziono — uzupełnij ręcznie','bad');}
      }catch(e){showPh('Błąd');setStatus('✗ Błąd — uzupełnij ręcznie','bad');}
    };
    // photo
    content().querySelector('#takePhoto').onclick=()=>content().querySelector('#file').click();
    content().querySelector('#file').addEventListener('change',e=>{
      const f=e.target.files[0];if(!f)return;
      downscale(f).then(d=>{if(d){coverVal=d;coverIsLocal=true;showImg(d);}});
    });
    // auto-search while typing
    let searchTimer=null;
    const autoSearch=()=>{
      clearTimeout(searchTimer);
      const a=content().querySelector('#artist').value.trim();
      const t=content().querySelector('#title').value.trim();
      if(!a&&!t)return;
      searchTimer=setTimeout(async()=>{
        try{
          if(CONFIG.CLAUDE_PROXY){
            setStatus('Szukam…','busy');
            const d=await claudeFind([a,t].filter(Boolean).join(' — '));
            if(d&&(d.title||d.artist)){
              if(!content().querySelector('#year').value&&d.year)content().querySelector('#year').value=d.year;
              if(!content().querySelector('#genre').value&&d.genre)content().querySelector('#genre').value=d.genre;
              if(!coverVal&&d.artist&&d.title){const c=await getApiCover(d.artist,d.title);if(c&&c.cover){coverVal=c.cover;coverIsLocal=false;showImg(c.cover);}}
              setStatus('✓ Dopasowano','ok');return;
            }
          }
          const d=await getApiCover(a||'',t||'');
          if(d){
            if(d.cover&&!coverVal){coverVal=d.cover;coverIsLocal=false;showImg(d.cover);}
            if(!content().querySelector('#year').value&&d.year)content().querySelector('#year').value=d.year;
            if(!content().querySelector('#genre').value&&d.genre)content().querySelector('#genre').value=d.genre;
            setStatus('✓ Dopasowano','ok');
          }
        }catch(e){}
      },1200);
    };
    content().querySelector('#artist').addEventListener('input',autoSearch);
    content().querySelector('#title').addEventListener('input',autoSearch);
    // back
    content().querySelector('#backToMethods3').onclick=e=>{e.preventDefault();showMethods();};
    // add
    content().querySelector('#addManual').onclick=async()=>{
      const artist=content().querySelector('#artist').value.trim();
      const title=content().querySelector('#title').value.trim();
      if(!artist&&!title){toast('Najpierw podaj wykonawcę lub tytuł');return;}
      const year=content().querySelector('#year').value.trim();
      const genre=content().querySelector('#genre').value.trim();
      const targetId=content().querySelector('#crateSel3').value;
      const nextPos=crateAlbums(targetId).length+1;
      const id=uid();
      let cover='';
      if(coverVal&&coverIsLocal){await saveCover(id,coverVal);cover='local';}
      else if(coverVal){cover=coverVal;}
      state.albums.push({id,crateId:targetId,position:nextPos,artist,title,genre,mood,year,cover,rating});
      await persist();
      addedThisSession++;
      const qp=sheet.querySelector('#qpill');qp.style.display='flex';
      qp.innerHTML=`<span>📦</span><span>Dodano <b>${addedThisSession}</b> ${plPly(addedThisSession)} w tej sesji</span>`;
      toast('Dodano · miejsce #'+nextPos+' (przód)');
      showMethods();
    };
  }

  showMethods();
  sheet.querySelector('.grab').onclick=()=>closeModal();
}
function downscale(file){
  return new Promise(res=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      // Step 1: draw full image
      const tmp=document.createElement('canvas');
      tmp.width=img.width;tmp.height=img.height;
      const tctx=tmp.getContext('2d');
      tctx.drawImage(img,0,0);
      // Step 2: auto-trim — detect background and crop
      const idata=tctx.getImageData(0,0,tmp.width,tmp.height);
      const d=idata.data;
      const w=tmp.width,h=tmp.height;
      // sample edge pixels to find background color
      let rSum=0,gSum=0,bSum=0,count=0;
      const sampleEdge=(x,y)=>{const i=(y*w+x)*4;rSum+=d[i];gSum+=d[i+1];bSum+=d[i+2];count++;};
      for(let x=0;x<w;x+=Math.max(1,Math.floor(w/50))){sampleEdge(x,0);sampleEdge(x,h-1);}
      for(let y=0;y<h;y+=Math.max(1,Math.floor(h/50))){sampleEdge(0,y);sampleEdge(w-1,y);}
      const bgR=rSum/count,bgG=gSum/count,bgB=bSum/count;
      const thresh=35;
      const isBg=(x,y)=>{const i=(y*w+x)*4;return Math.abs(d[i]-bgR)+Math.abs(d[i+1]-bgG)+Math.abs(d[i+2]-bgB)<thresh*3;};
      const step=Math.max(1,Math.floor(Math.min(w,h)/100));
      let top=0,bot=h-1,left=0,right=w-1;
      // top edge
      outer:for(let y=0;y<h*0.4;y+=step){for(let x=Math.floor(w*0.2);x<w*0.8;x+=step){if(!isBg(x,y)){top=Math.max(0,y-2);break outer;}}}
      // bottom edge
      outer2:for(let y=h-1;y>h*0.6;y-=step){for(let x=Math.floor(w*0.2);x<w*0.8;x+=step){if(!isBg(x,y)){bot=Math.min(h-1,y+2);break outer2;}}}
      // left edge
      outer3:for(let x=0;x<w*0.4;x+=step){for(let y=Math.floor(h*0.2);y<h*0.8;y+=step){if(!isBg(x,y)){left=Math.max(0,x-2);break outer3;}}}
      // right edge
      outer4:for(let x=w-1;x>w*0.6;x-=step){for(let y=Math.floor(h*0.2);y<h*0.8;y+=step){if(!isBg(x,y)){right=Math.min(w-1,x+2);break outer4;}}}
      // only crop if meaningful bounds
      let cx=left,cy=top,cw=right-left+1,ch=bot-top+1;
      if(cw<w*0.4||ch<h*0.4){cx=0;cy=0;cw=w;ch=h;}
      // Step 3: make squarish
      const side=Math.min(cw,ch);
      if(cw>ch*1.15){cx+=Math.floor((cw-side)/2);cw=side;}
      else if(ch>cw*1.15){cy+=Math.floor((ch-side)/2);ch=side;}
      // Step 4: downscale to max 600px
      const max=600,s=Math.min(1,max/Math.max(cw,ch));
      const cv=document.createElement('canvas');
      cv.width=Math.round(cw*s);cv.height=Math.round(ch*s);
      cv.getContext('2d').drawImage(tmp,cx,cy,cw,ch,0,0,cv.width,cv.height);
      URL.revokeObjectURL(url);
      res(cv.toDataURL('image/jpeg',0.82));
    };
    img.onerror=()=>{URL.revokeObjectURL(url);res(null);};
    img.src=url;
  });
}

/* ===== LISTEN — carousel ===== */
let listenFilters={genre:'',mood:''}, deck=[], cIdx=0;
function renderListen(){
  const m=main();
  m.innerHTML=`<h2 class="page-h">Czego posłuchać</h2>
    <p class="lead">Wybierz filtry, potem przesuwaj w lewo i prawo — po jednej płycie. Pod każdą okładką jest skrzynka i miejsce.</p>
    <div class="sectlabel">Gatunek</div>
    <div class="chiprow" id="lg">${['Dowolny',...usedGenres()].map(g=>`<span class="chip ${(g==='Dowolny'&&!listenFilters.genre)||listenFilters.genre===g?'on':''}" data-lg="${g==='Dowolny'?'':g}">${g}</span>`).join('')}</div>
    <div class="sectlabel">Nastrój / tempo</div>
    <div class="chiprow" id="lm" style="margin-bottom:22px">${['Dowolny',...usedMoods()].map(g=>`<span class="chip ${(g==='Dowolny'&&!listenFilters.mood)||listenFilters.mood===g?'on':''}" data-lm="${g==='Dowolny'?'':g}">${g}</span>`).join('')}</div>
    <button class="btn" id="startDeck">Pokaż płyty ◎</button>`;
  m.querySelectorAll('[data-lg]').forEach(c=>c.onclick=()=>{listenFilters.genre=c.dataset.lg;renderListen();});
  m.querySelectorAll('[data-lm]').forEach(c=>c.onclick=()=>{listenFilters.mood=c.dataset.lm;renderListen();});
  document.getElementById('startDeck').onclick=()=>{
    deck=state.albums.filter(a=>(!listenFilters.genre||a.genre===listenFilters.genre)&&(!listenFilters.mood||a.mood===listenFilters.mood));
    for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
    cIdx=0; renderCarousel(0);
  };
}
function cardInner(a){
  const crate=state.crates.find(c=>c.id===a.crateId);
  return `<div class="art" ${a.cover?`data-cover-bg="${a.id}"`:''}>${a.cover?'':'brak okładki'}</div>
    <div class="meta"><b>${esc(a.title)||'Bez tytułu'}</b>
      <div class="sub muted">${esc(a.artist)} ${a.year?'· '+a.year:''} · ${a.genre||'—'}</div>
      ${a.rating?'<div class="stars" style="margin-top:4px">'+('\u2605'.repeat(a.rating)+'\u2606'.repeat(5-a.rating))+'</div>':''}
      <div class="loc-box">${neighborInfo(a)}</div>
    </div>`;
}
function renderCarousel(dir){
  const m=main();
  if(!deck.length){
    m.innerHTML=`<div class="empty"><div class="ico">∅</div><div class="big">Brak wyników</div><div>Poluzuj filtry i spróbuj ponownie.</div></div><button class="btn ghost" id="bk">Wróć do filtrów</button>`;
    document.getElementById('bk').onclick=renderListen; return;
  }
  cIdx=Math.max(0,Math.min(cIdx,deck.length-1));
  const a=deck[cIdx], prev=deck[cIdx-1], next=deck[cIdx+1];
  const enter=dir>0?'enter-r':(dir<0?'enter-l':'');
  m.innerHTML=`
    <div class="carousel" id="stage">
      ${prev?`<div class="cc peek left">${cardInner(prev)}</div>`:''}
      ${next?`<div class="cc peek right">${cardInner(next)}</div>`:''}
      <div class="cc center ${enter}" id="centerCard">${cardInner(a)}</div>
    </div>
    <div class="car-ctrl">
      <button class="circ" id="prev" ${prev?'':'disabled'}>‹</button>
      <div class="counter">${cIdx+1} / ${deck.length}</div>
      <button class="circ" id="next" ${next?'':'disabled'}>›</button>
    </div>
    <button class="btn ghost" id="bk" style="margin-top:14px">Zmień filtry</button>`;
  hydrateCovers(m);
  document.getElementById('bk').onclick=renderListen;
  document.getElementById('prev').onclick=()=>step(-1);
  document.getElementById('next').onclick=()=>step(1);
  enableCarouselSwipe(document.getElementById('centerCard'));
}
function step(d){
  const target=cIdx+d;
  if(target<0||target>=deck.length) return;
  cIdx=target; renderCarousel(d);
}
function enableCarouselSwipe(card){
  if(!card)return;
  let x0=0,y0=0,dx=0,dy=0,dragging=false,decided=false,horizontal=false;
  const TH=64; // not too sensitive
  const down=e=>{ dragging=true;decided=false;horizontal=false;dx=0;dy=0; x0=e.clientX;y0=e.clientY; card.style.transition='none'; card.setPointerCapture?.(e.pointerId); };
  const move=e=>{
    if(!dragging)return;
    dx=e.clientX-x0; dy=e.clientY-y0;
    if(!decided){ if(Math.abs(dx)>8||Math.abs(dy)>8){ decided=true; horizontal=Math.abs(dx)>Math.abs(dy); } }
    if(!horizontal)return;
    e.preventDefault();
    // clamp so a single drag can never reveal more than one neighbour
    let vx=Math.max(-120,Math.min(120,dx));
    const atStart=cIdx===0, atEnd=cIdx===deck.length-1;
    if((vx>0&&atStart)||(vx<0&&atEnd)) vx*=0.25; // rubber-band at ends
    card.style.transform=`translateX(${vx}px) rotate(${vx*0.02}deg)`;
  };
  const up=()=>{
    if(!dragging)return; dragging=false;
    card.style.transition='transform .2s';
    if(horizontal && dx<=-TH){ card.style.transform=''; step(1); }
    else if(horizontal && dx>=TH){ card.style.transform=''; step(-1); }
    else { card.style.transform=''; }
    dx=0;
  };
  card.addEventListener('pointerdown',down);
  card.addEventListener('pointermove',move);
  card.addEventListener('pointerup',up);
  card.addEventListener('pointercancel',up);
}

  const m=main(); const q=searchQ.toLowerCase();
  let results=state.albums.filter(a=>{
    const hit=!q||(a.artist+' '+a.title+' '+a.genre).toLowerCase().includes(q);
    const gh=!searchGenre||a.genre===searchGenre; return hit&&gh;
  });
  m.innerHTML=`<h2 class="page-h">Szukaj w kolekcji</h2>
    <div class="searchbar"><span class="si">⌕</span><input id="sq" placeholder="Wykonawca, album, gatunek…" value="${esc(searchQ)}" autocomplete="off"></div>
    <div class="chiprow" style="margin-bottom:6px">${['Wszystkie',...usedGenres()].map(g=>`<span class="chip ${(g==='Wszystkie'&&!searchGenre)||searchGenre===g?'on':''}" data-sg="${g==='Wszystkie'?'':g}">${g}</span>`).join('')}</div>
    <div class="sectlabel">${results.length} ${plPly(results.length)}</div>
    <div id="sres">${results.length?results.map(a=>{
      const crate=state.crates.find(c=>c.id===a.crateId);
      return `<div class="row" data-go="${a.crateId}">
        ${a.cover?`<img class="cover" data-cover="${a.id}" alt="">`:`<div class="cover">brak okładki</div>`}
        <div class="info"><b>${esc(a.title)||'Bez tytułu'}</b><div class="sub">${esc(a.artist)} ${a.genre?'· '+a.genre:''} ${a.rating?'<span class="stars">'+('\u2605'.repeat(a.rating)+'\u2606'.repeat(5-a.rating))+'</span>':''}</div></div>
        <div style="text-align:right;min-width:100px">
          <div class="res-loc">${neighborInfo(a)}</div>
        </div>
      </div>`;
    }).join(''):`<div class="empty"><div class="ico">⌕</div><div class="big">Nic nie znaleziono</div><div>Spróbuj innej nazwy lub wyczyść filtr gatunku.</div></div>`}</div>`;
  hydrateCovers(m);
  const inp=m.querySelector('#sq');
  inp.oninput=()=>{searchQ=inp.value;const pos=inp.selectionStart;renderSearch();const ni=main().querySelector('#sq');ni.focus();ni.setSelectionRange(pos,pos);};
  m.querySelectorAll('[data-sg]').forEach(c=>c.onclick=()=>{searchGenre=c.dataset.sg;renderSearch();});
  m.querySelectorAll('[data-go]').forEach(r=>r.onclick=()=>{state.tab='crates';state.crateId=r.dataset.go;render();});
}

          <button class="btn ghost" id="syncPull" style="flex:1;font-size:14px">↓ Pobierz z chmury</button>
        </div>

      </div>

        <button class="btn" id="updateApp" style="width:100%;font-size:14px">Pobierz najnowszą wersję</button>

      </div>

  m.querySelector('#syncPush').onclick=async()=>{

    st.textContent=ok?'✓ Wysłano pomyślnie':'✗ Błąd wysyłania'; st.style.color=ok?'var(--keep)':'var(--oxblood)';
  };
  m.querySelector('#syncPull').onclick=async()=>{
    const st=m.querySelector('#syncStatus');
    st.textContent='Pobieranie…'; st.style.color='var(--amber)';
    const cloud=await cloudPull();
    if(cloud){
      state.crates=cloud.crates||[];state.albums=cloud.albums||[];
      if(cloud.covers){ for(const[id,d]of Object.entries(cloud.covers)) await saveCover(id,d); }
      await sset('winyle-meta',{crates:state.crates,albums:state.albums});
      st.textContent='✓ Pobrano '+state.albums.length+' płyt'; st.style.color='var(--keep)';
    } else { st.textContent='✗ Brak danych w chmurze lub błąd'; st.style.color='var(--oxblood)'; }
  };
  m.querySelector('#updateApp').onclick=async()=>{
    const st=m.querySelector('#updateStatus');
    st.textContent='Wysyłanie danych do chmury…'; st.style.color='var(--amber)';
    await cloudPush();
    st.textContent='Czyszczenie cache…';
    if('serviceWorker' in navigator){
      const regs=await navigator.serviceWorker.getRegistrations();
      for(const r of regs) await r.unregister();
      const keys=await caches.keys();
      for(const k of keys) await caches.delete(k);
    }
    st.textContent='Przeładowanie…';
    location.reload(true);
  };
}
